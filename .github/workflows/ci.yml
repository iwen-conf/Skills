name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Ruff
        run: |
          uv run --no-sync ruff check \
            scripts/arc_privacy.py \
            scripts/build_skills_index.py \
            scripts/run_evals.py \
            scripts/validate_skills.py \
            src/arc_core \
            "arc:cartography/scripts/cartographer.py" \
            "arc:cartography/scripts/test_cartographer.py" \
            tests/test_arc_privacy.py \
            tests/test_skill_validation.py \
            tests/test_eval_runner.py \
            tests/test_skill_registry.py

      - name: Mypy
        run: uv run --no-sync mypy

      - name: Validate skills
        run: uv run --no-sync python scripts/validate_skills.py

      - name: Pytest
        run: uv run --no-sync pytest tests "arc:cartography/scripts/test_cartographer.py"
